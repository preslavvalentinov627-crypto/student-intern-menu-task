<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кухня | Админ панел</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="css/style.css">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
</head>
<body>

    <header>
        <h1 data-i18n="kitchen_title">👩‍🍳 Кухня — админ панел</h1>
        <div class="header-right">
            <div class="toggles">
                <button id="btn-theme" class="toggle-btn" title="Тъмен / светъл режим">🌙</button>
                <button id="btn-lang" class="toggle-btn" title="Език / Language">EN</button>
            </div>
            <!-- Потребителското име се попълва от admin.js -->
            <span id="who"></span>
            <button id="btn-logout" data-i18n="logout">Изход</button>
        </div>
    </header>

    <main>

        <!-- ====================================================
             СЕКЦИЯ 1: Ястия (РАБОТЕЩ ПРИМЕР за запис в базата)
             ==================================================== -->
        <section class="panel">
            <h2 data-i18n="dishes_title">Ястия</h2>

            <!-- Списъкът се пълни от admin.js -> loadItems() -->
            <ul id="items-list"></ul>

            <h3 data-i18n="add_dish_title">Добави ново ястие</h3>
            <form id="item-form">
                <input id="item-name" data-i18n-placeholder="ph_dish_name" placeholder="Име, напр. Леща чорба" required>
                <select id="item-type">
                    <option value="soup" data-i18n="type_soup">🍲 Супа</option>
                    <option value="main" data-i18n="type_main">🍛 Основно</option>
                    <option value="dessert" data-i18n="type_dessert">🍰 Десерт</option>
                </select>
                <input id="item-allergens" data-i18n-placeholder="ph_allergens" placeholder="Алергени, напр. глутен, мляко (по желание)">
                <button type="submit" data-i18n="btn_add_dish">Добави ястие</button>
            </form>
        </section>

        <!-- ====================================================
             СЕКЦИЯ 2: Дневно меню
             (работи за минали, днешни и бъдещи дати - виж admin.js)
             ==================================================== -->
        <section class="panel">
            <h2 data-i18n="daily_menu_title">Дневно меню</h2>
            <form id="menu-form">
                <input type="date" id="menu-date-input" required>

                <label for="select-soup" data-i18n="label_soup">Супа</label>
                <select id="select-soup"></select>

                <label for="select-main" data-i18n="label_main">Основно</label>
                <select id="select-main"></select>

                <label for="select-dessert" data-i18n="label_dessert">Десерт</label>
                <select id="select-dessert"></select>

                <input id="menu-notes" data-i18n-placeholder="ph_notes" placeholder="Бележки (по желание)">

                <button type="submit" data-i18n="btn_publish">Публикувай</button>
            </form>
        </section>

    </main>

    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>

    <!-- ===== МОДАЛЕН ПРОЗОРЕЦ ЗА ПОТВЪРЖДЕНИЕ ===== -->
    <div id="delete-modal" class="modal-overlay" role="dialog" aria-modal="true">
        <div class="modal-box">
            <p id="delete-modal-msg"></p>
            <div class="modal-actions">
                <button id="btn-confirm-delete" class="btn-danger" data-i18n="confirm_delete_btn">Да, премахни</button>
                <button id="btn-cancel-delete" class="btn-secondary" data-i18n="cancel_btn">Откажи</button>
            </div>
        </div>
    </div>
</body>
</html>
